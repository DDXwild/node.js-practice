stages:
  - build
  - test
  - deploy

default:
  image: node:24

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/
    - .npm/

variables:
  NPM_CONFIG_CACHE: '$CI_PROJECT_DIR/.npm'

build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

test:
  stage: test
  script:
    - npm ci
    - npm run test:coverage

deploy:
  stage: deploy
  image: ghcr.io/superfly/flyctl:latest
  script:
    - fly deploy --remote-only
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
